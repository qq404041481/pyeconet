name: "Publish Econet to D1"

on:
  push:
    branches:
      - master
  schedule:
    -   cron: "50 19 * * *"
    # 19:50 UTC time -> 12:50pm

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  publishToEconet:
    runs-on: ubuntu-latest
    name: check Econet
    environment: env
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip certifi
          pip install requests
          pip install "aiohttp>=3.10"
          pip install paho-mqtt python-etcd

      - name: Debug Rheem TLS
        run: |
          python - <<'PY'
          import certifi
          import ssl
          import urllib.request

          print("OpenSSL:", ssl.OPENSSL_VERSION)
          print("certifi:", certifi.where())
          context = ssl.create_default_context(cafile=certifi.where())
          context.load_default_certs()
          with urllib.request.urlopen("https://rheem.clearblade.com", context=context, timeout=20) as response:
              print("rheem.clearblade.com:", response.status)
          PY

      - name: Run publish to Econet
        run: python3 src/report_status.py
        env:
          GIT_D1_ACCOUNT: ${{ secrets.GIT_D1_ACCOUNT }}
          GIT_D1_DATABASE: ${{ secrets.GIT_D1_DATABASE }}
          GIT_D1_DATABASE_API_KEY: ${{ secrets.GIT_D1_DATABASE_API_KEY }}
          GIT_ECONET_PASSWORD: ${{ secrets.GIT_ECONET_PASSWORD }}
          GIT_ECONET_USERNAME: ${{ secrets.GIT_ECONET_USERNAME }}
