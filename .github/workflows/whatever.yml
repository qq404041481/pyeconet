name: "Publish Econet to D1"

on:
  push:
    branches:
      - master
  schedule:
    - cron: "50 19 * * *" # 19:50 UTC -> 12:50pm PST

  workflow_dispatch:

jobs:
  publishToEconet:
    runs-on: ubuntu-latest
    name: check Econet
    environment: env
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade certifi
          python3 -m pip install requests "aiohttp>=3.10" paho-mqtt python-etcd

      - name: Debug Rheem TLS
        run: |
          python3 - <<'PY'
          import certifi
          import ssl
          import urllib.request

          print("OpenSSL Version:", ssl.OPENSSL_VERSION)
          print("Certifi Path:", certifi.where())
          
          # Rely strictly on certifi's bundle, removed load_default_certs()
          context = ssl.create_default_context(cafile=certifi.where())
          
          try:
              with urllib.request.urlopen("https://rheem.clearblade.com", context=context, timeout=20) as response:
                  print("Success! rheem.clearblade.com returned status:", response.status)
          except Exception as e:
              print("TLS Verification Failed:", e)
              raise e
          PY

      - name: Run publish to Econet
        run: python3 src/report_status.py
        env:
          GIT_D1_ACCOUNT: ${{ secrets.GIT_D1_ACCOUNT }}
          GIT_D1_DATABASE: ${{ secrets.GIT_D1_DATABASE }}
          GIT_D1_DATABASE_API_KEY: ${{ secrets.GIT_D1_DATABASE_API_KEY }}
          GIT_ECONET_PASSWORD: ${{ secrets.GIT_ECONET_PASSWORD }}
          GIT_ECONET_USERNAME: ${{ secrets.GIT_ECONET_USERNAME }}
